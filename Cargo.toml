[package]
name         = "signal-persona-terminal"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/signal-persona-terminal"
description  = "Signal contract - persona-harness to terminal transport channel."
publish      = false

[lib]
name = "signal_persona_terminal"
path = "src/lib.rs"

[dependencies]
signal-core         = { git = "https://github.com/LiGoldragon/signal-core.git" }
nota-codec          = { git = "https://github.com/LiGoldragon/nota-codec.git", branch = "main" }
nota-config         = { git = "https://github.com/LiGoldragon/nota-config.git", branch = "main" }
signal-persona      = { git = "https://github.com/LiGoldragon/signal-persona.git" }
signal-persona-auth = { git = "https://github.com/LiGoldragon/signal-persona-auth.git" }
rkyv                = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror           = "2"

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
